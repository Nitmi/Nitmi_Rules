name: Purge Cloudflare Cache By URL

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CDN_BASE_URL: https://gh.123778.xyz/Nitmi_Rules/main

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "$BEFORE_SHA" == "$ZERO_SHA" ]]; then
            if git rev-parse "${AFTER_SHA}^" >/dev/null 2>&1; then
              BEFORE_SHA="$(git rev-parse "${AFTER_SHA}^")"
            else
              BEFORE_SHA="$EMPTY_TREE"
            fi
          fi

          git diff --name-status --find-renames "$BEFORE_SHA" "$AFTER_SHA" > changed-files.txt

          if [[ ! -s changed-files.txt ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          lines = Path("changed-files.txt").read_text(encoding="utf-8").splitlines()
          paths = set()

          for raw_line in lines:
              if not raw_line.strip():
                  continue

              parts = raw_line.split("\t")
              status = parts[0]

              if status.startswith("R") or status.startswith("C"):
                  if len(parts) >= 3:
                      paths.add(parts[1])
                      paths.add(parts[2])
                  continue

              if len(parts) >= 2:
                  paths.add(parts[1])

          cleaned = sorted(path for path in paths if path and not path.endswith("/"))
          Path("changed-files.json").write_text(
              json.dumps(cleaned, ensure_ascii=False),
              encoding="utf-8",
          )
          print(f"Detected {len(cleaned)} changed files.")
          for path in cleaned:
              print(path)
          PY

          if [[ "$(python - <<'PY'
          import json
          from pathlib import Path
          print(len(json.loads(Path("changed-files.json").read_text(encoding="utf-8"))))
          PY
          )" == "0" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Build purge URL list
        id: purge-urls
        if: steps.changed-files.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.parse import quote

          base_url = os.environ["CDN_BASE_URL"].rstrip("/")
          changed_files = json.loads(Path("changed-files.json").read_text(encoding="utf-8"))

          urls = [f"{base_url}/{quote(path, safe='/')}" for path in changed_files]
          Path("purge-urls.json").write_text(
              json.dumps(urls, ensure_ascii=False),
              encoding="utf-8",
          )
          print(f"Prepared {len(urls)} purge URLs.")
          for url in urls:
              print(url)
          PY

      - name: Purge Cloudflare cache
        if: steps.purge-urls.outcome == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "CLOUDFLARE_API_TOKEN is not set."
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_ZONE_ID:-}" ]]; then
            echo "CLOUDFLARE_ZONE_ID is not set."
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          urls = json.loads(Path("purge-urls.json").read_text(encoding="utf-8"))
          Path("purge-payload.json").write_text(
              json.dumps({"files": urls}, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          curl --fail-with-body --silent --show-error \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @purge-payload.json
